<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .inquiry-viewer-layout {
        display: grid;
        gap: 1rem;
      }

      .inquiry-viewer-form {
        display: grid;
        gap: 0.6rem;
      }

      .inquiry-viewer-grid {
        display: grid;
        gap: 0.55rem;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .inquiry-viewer-actions {
        display: flex;
        gap: 0.55rem;
        flex-wrap: wrap;
      }

      .inquiry-viewer-list {
        margin-top: 0.2rem;
        display: grid;
        gap: 0.8rem;
      }

      .inquiry-item {
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 12px;
        background: rgba(6, 14, 20, 0.66);
        padding: 0.8rem;
      }

      .inquiry-item h3 {
        margin: 0 0 0.45rem;
        font-size: 1rem;
        letter-spacing: 0.02em;
      }

      .inquiry-item p {
        margin: 0.2rem 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .inquiry-item .label {
        color: rgba(239, 247, 255, 0.72);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="app-bg"></div>
    <main class="game-shell">
      <section class="menu-screen inquiry-viewer-layout">
        <header class="top-bar">
          <h1>Inquiry Viewer</h1>
          <p>問い合わせ一覧を確認する管理者向けページです。</p>
        </header>

        <article class="game-card inquiry-viewer-form">
          <div class="inquiry-viewer-grid">
            <input id="viewerUserId" class="room-input" type="text" placeholder="クラウドID" aria-label="Cloud user id" />
            <input id="viewerPassword" class="room-input" type="password" placeholder="クラウドパスワード" aria-label="Cloud password" />
            <input id="viewerLimit" class="room-input" type="number" min="1" max="200" value="50" placeholder="件数" aria-label="Limit" />
          </div>
          <div class="inquiry-viewer-actions">
            <button id="viewerLoadBtn" class="start-btn" type="button">一覧を取得</button>
          </div>
          <p id="viewerStatus" class="room-menu-message"></p>
        </article>

        <article class="game-card">
          <h2>Recent Inquiries</h2>
          <div id="viewerList" class="inquiry-viewer-list"></div>
        </article>
      </section>
    </main>

    <script type="module" src="/src/inquiry-list.js"></script>
  </body>
</html>
