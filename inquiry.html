<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiry Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .inquiry-layout {
        display: grid;
        gap: 1rem;
      }

      .inquiry-form {
        display: grid;
        gap: 0.65rem;
      }

      .inquiry-form label {
        font-size: 0.82rem;
        letter-spacing: 0.03em;
        color: rgba(239, 247, 255, 0.88);
      }

      .inquiry-message {
        min-height: 180px;
        resize: vertical;
      }

      .inquiry-counter {
        margin: 0;
        text-align: right;
        color: rgba(239, 247, 255, 0.74);
        font-size: 0.78rem;
      }

      .inquiry-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .inquiry-actions .start-btn,
      .inquiry-link-btn {
        margin-left: 0;
      }

      .inquiry-link-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }

      .inquiry-note {
        margin: 0;
        color: rgba(239, 247, 255, 0.75);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="app-bg"></div>
    <main class="game-shell">
      <section class="menu-screen inquiry-layout">
        <header class="top-bar">
          <h1>Inquiry Form</h1>
          <p>ご意見・不具合報告をこちらから送信できます。</p>
        </header>

        <article class="game-card">
          <form id="inquiryForm" class="inquiry-form">
            <label for="inquiryName">お名前（任意）</label>
            <input id="inquiryName" class="room-input" type="text" maxlength="36" placeholder="匿名でも送信できます" />

            <label for="inquiryMessage">内容</label>
            <textarea
              id="inquiryMessage"
              class="room-input inquiry-message"
              maxlength="2000"
              required
              placeholder="不具合の内容、発生手順、要望などを入力してください"
            ></textarea>
            <p id="inquiryCounter" class="inquiry-counter">0 / 2000</p>

            <label for="inquirySource">送信元URL</label>
            <input id="inquirySource" class="room-input" type="url" readonly />

            <div class="inquiry-actions">
              <button id="inquirySubmitBtn" class="start-btn" type="submit">送信する</button>
              <a class="start-btn ghost inquiry-link-btn" href="/">ゲームに戻る</a>
              <a class="start-btn ghost inquiry-link-btn" href="/inquiries.html">管理者一覧</a>
            </div>

            <p id="inquiryStatus" class="room-menu-message"></p>
            <p class="inquiry-note">送信内容は運営確認用に保存されます。個人情報の入力は必要最小限にしてください。</p>
          </form>
        </article>
      </section>
    </main>

    <script type="module" src="/src/inquiry-form.js"></script>
  </body>
</html>
